  h += `<input type="text" id="new-auth-aff" placeholder="Affiliation">`;
  h += `<input type="text" id="new-auth-note" placeholder="Research note">`;
  h += `<input type="text" id="new-auth-orcid" placeholder="ORCID (0000-...)" style="font-size:11px">`;
  h += `</div>`;
  h += `<button class="btn btn-sm mt-3" id="btn-add-author" style="background:var(--purple);color:#fff;width:100%">Add Author</button>`;
  h += `</div></div>`;

  // Save
  h += `<div class="flex gap-2 mt-3">`;
  h += `<button class="btn btn-primary flex-1" id="btn-save-config">💾 Save Profile</button>`;
  if (state.profiles.length > 1) h += `<button class="btn btn-danger" id="btn-delete-profile">Delete</button>`;
  h += `</div></div>`;
  return h;
}

function renderEmail() {
  let h = `<div style="padding-top:16px">`;
  h += `<h2 style="font-family:var(--font-head);font-size:20px;color:var(--navy);margin-bottom:8px">Weekly Email Setup</h2>`;

  // Manual email
  h += `<div class="card">`;
  h += `<h3 style="font-family:var(--font-head);font-size:16px;margin-bottom:8px">📧 Send Now</h3>`;
  h += `<p style="font-size:13px;color:var(--muted);margin-bottom:12px">Run a search first, then click to compose an email with this week's digest.</p>`;
  h += `<label style="font-size:12px;font-weight:600">Recipients (comma-separated)<input type="email" id="cfg-email-recipients" value="${esc(state.profile.emailRecipients||"")}" placeholder="you@esrf.fr, colleague@crick.ac.uk" style="margin-top:4px"></label>`;
  h += `<div class="flex gap-2 mt-3">`;
  h += `<button class="btn btn-primary btn-sm" id="btn-email-send" ${state.results?"":"disabled"}>📧 Compose Email</button>`;
  h += `<button class="btn btn-secondary btn-sm" id="btn-copy-digest" ${state.results?"":"disabled"}>📋 Copy Full Digest</button>`;
  h += `</div></div>`;

  // Automated
  h += `<div class="email-section">`;
  h += `<h3>⏰ Automated Weekly Email (via cron)</h3>`;
  h += `<p style="font-size:13px;color:var(--muted);margin-bottom:12px">For truly automated weekly emails without opening a browser, use the companion Python script on your cluster:</p>`;
  h += `<div class="code-block"># 1. Download the companion files
# lit_monitor.py + lit_monitor_config.yaml

# 2. Install (one time)
pip install requests pyyaml --break-system-packages

# 3. Test
python3 lit_monitor.py --days 14 --html digest.html

# 4. Set up weekly cron (Sunday 8am)
crontab -e
0 8 * * 0 python3 ~/scripts/lit_monitor.py --email</div>`;
  h += `<p style="font-size:12px;color:var(--muted);margin-top:8px">The Python script queries bioRxiv, PubMed, and arXiv APIs directly — zero hallucination risk, zero API key needed.</p>`;
  h += `</div></div>`;
  return h;
}

// ============================================================
// EVENT BINDING
// ============================================================
function bindEvents() {
  // Use property assignment (not addEventListener) to prevent stacking on re-render
  const c = $("content");
  c.onclick = handleClick;
  c.oninput = handleInput;
  c.onkeydown = handleKeydown;
}

function handleClick(e) {
  const t = e.target;
  if (t.id === "btn-search") runSearch();
  if (t.id === "btn-copy") { navigator.clipboard.writeText(generateDigest(state.results, state.profile)); state.message = { type:"success", text:"Digest copied!" }; render(); }
  if (t.id === "btn-toggle-sort") { state.sortBy = state.sortBy === "score" ? "date" : "score"; render(); }
  if (t.id === "btn-email-now" || t.id === "btn-email-send") { state.profile.emailRecipients = ($("cfg-email-recipients")||{}).value || state.profile.emailRecipients; saveProfile(); emailDigest(); }
  if (t.id === "btn-copy-digest") { navigator.clipboard.writeText(generateDigest(state.results, state.profile)); state.message = { type:"success", text:"Full digest copied to clipboard!" }; render(); }
  if (t.id === "btn-save-config") {
    const oldName = state.activeProfile;
    const newName = ($("cfg-name")?.value || state.profile.name).trim();
    if (!newName) return;

    // If name changed, clean up the old profile entry
    if (oldName !== newName) {
      localStorage.removeItem("lm-p:" + oldName);
      localStorage.removeItem("lm-r:" + oldName);
      state.profiles = state.profiles.filter(n => n !== oldName);
    }

    state.profile.name = newName;
    state.profile.description = $("cfg-desc")?.value || "";
    state.profile.lookbackDays = parseInt($("cfg-days")?.value) || 7;
    state.profile.minScore = parseInt($("cfg-minscore")?.value) || 2;
    state.profile.authorScore = parseInt($("cfg-authscore")?.value) || 8;
    state.activeProfile = newName;
    state.apiKey = $("cfg-apikey")?.value || "";
    state.geminiKey = $("cfg-geminikey")?.value || "";
    localStorage.setItem("lm-apikey", state.apiKey);
    localStorage.setItem("lm-geminikey", state.geminiKey);
    saveProfile(); state.message = { type:"success", text:"Profile saved!" }; state.view = "results"; render();
  }
  if (t.id === "btn-delete-profile" && state.profiles.length > 1) {
    if (!confirm("Delete this profile?")) return;
    state.profiles = state.profiles.filter(n => n !== state.activeProfile);
    localStorage.removeItem("lm-p:" + state.activeProfile);
    localStorage.removeItem("lm-r:" + state.activeProfile);
    state.activeProfile = state.profiles[0];
    state.profile = JSON.parse(localStorage.getItem("lm-p:" + state.activeProfile) || "null") || JSON.parse(JSON.stringify(DEFAULT_PROFILE));
    localStorage.setItem("lm-profiles", JSON.stringify(state.profiles));
    state.results = null; render();
  }
  if (t.id === "btn-add-author") {
    const last = $("new-auth-last")?.value?.trim();
    if (!last) return;
    const orcidRaw = ($("new-auth-orcid")?.value || "").trim();
    const orcidMatch = orcidRaw.match(/(\d{4}-\d{4}-\d{4}-\d{3}[\dX])/);
    const newAuthor = {
      last,
      first: $("new-auth-first")?.value || "",
      middle: $("new-auth-middle")?.value || "",
      aff: $("new-auth-aff")?.value || "",
      note: $("new-auth-note")?.value || ""
    };
    if (orcidMatch) {
      newAuthor.orcid = `https://orcid.org/${orcidMatch[1]}`;
      state.profile.authors.push(newAuthor);
      const idx = state.profile.authors.length - 1;
      state.message = { type: "info", text: `Resolving ORCID ${orcidMatch[1]}…` };
      render();
      fetch(`https://api.openalex.org/authors/orcid:${orcidMatch[1]}?mailto=lit-monitor@research.org`)
        .then(r => r.ok ? r.json() : Promise.reject("Not found"))
        .then(data => {
          if (data.id) {
            state.profile.authors[idx].openalexId = data.id;
            state.message = { type: "success", text: `✓ Added ${data.display_name} — ORCID resolved to ${data.id}` };
          } else {
            state.message = { type: "warn", text: `Added ${last}, but ORCID didn't resolve to an OpenAlex ID.` };
          }
          saveProfile(); render();
        })
        .catch(() => {
          state.message = { type: "warn", text: `Added ${last}, but ORCID ${orcidMatch[1]} not found in OpenAlex.` };
          render();
        });
    } else {
      state.profile.authors.push(newAuthor);
      render();
    }
  }
  // Accept a suggested keyword
  if (t.dataset.acceptKw) {
    const [tierKey, kw] = t.dataset.acceptKw.split(":::");
    if (state.profile.tiers[tierKey]) {
      state.profile.tiers[tierKey].keywords.push(kw);
      render();
    }
  }
  // Dismiss suggestions
  if (t.id === "btn-dismiss-suggestions") {
    state.kwSuggestions = null;
    render();
  }
  // AI Verify author via Gemini
  if (t.dataset.aiVerify != null) {
    const idx = parseInt(t.dataset.aiVerify);
    const a = state.profile.authors[idx];
    if (!a || !state.geminiKey) return;
    state.idLookup = { authorIdx: idx, loading: true, candidates: null, customQuery: '' };
    state.message = { type: "info", text: `Gemini is searching for ${a.first} ${a.last}…` };
    render();
    geminiVerifyAuthor(`${a.first} ${a.last}`, a.aff, a.note, state.geminiKey).then(result => {
      if (result?.openalexId && result.confidence !== "low") {
        state.profile.authors[idx].openalexId = result.openalexId;
        if (result.orcid) state.profile.authors[idx].orcid = result.orcid;
        saveProfile();
        state.idLookup = null;
        state.message = { type: "success", text: `✓ Found ${result.name || a.last} at ${result.institution || "?"} (confidence: ${result.confidence})` };
      } else {
        state.message = { type: "warn", text: result?.note || `Could not confidently identify ${a.first} ${a.last}. Try pasting their OpenAlex URL or ORCID manually.` };
      }
      render();
    }).catch(err => {
      state.message = { type: "warn", text: "Gemini verify error: " + err.message };
      state.idLookup = null;
      render();
    });
  }
  // Manual ID paste (OpenAlex URL/ID or ORCID)
  if (t.dataset.setManualId != null) {
    const idx = parseInt(t.dataset.setManualId);
    const input = document.querySelector(`.manual-id-input[data-manual-idx="${idx}"]`);
    const raw = (input?.value || "").trim();
    if (!raw) return;

    // Detect format
    const orcidMatch = raw.match(/(\d{4}-\d{4}-\d{4}-\d{3}[\dX])/);
    const oaMatch = raw.match(/(A\d{5,})/i);
    const oaUrlMatch = raw.match(/openalex\.org\/(A\d+)/i);

    if (oaUrlMatch || oaMatch) {
      const id = oaUrlMatch ? `https://openalex.org/${oaUrlMatch[1]}` : `https://openalex.org/${oaMatch[1]}`;
      state.profile.authors[idx].openalexId = id;
      saveProfile();
      state.idLookup = null;
      state.message = { type: "success", text: `✓ OpenAlex ID set: ${id}` };
      render();
    } else if (orcidMatch) {
      // Resolve ORCID → OpenAlex ID
      state.message = { type: "info", text: `Resolving ORCID ${orcidMatch[1]}…` };
      render();
      fetch(`https://api.openalex.org/authors/orcid:${orcidMatch[1]}?mailto=lit-monitor@research.org`)
        .then(r => r.ok ? r.json() : Promise.reject("Not found"))
        .then(data => {
          if (data.id) {
            state.profile.authors[idx].openalexId = data.id;
            state.profile.authors[idx].orcid = `https://orcid.org/${orcidMatch[1]}`;
            saveProfile();
            state.idLookup = null;
            state.message = { type: "success", text: `✓ ORCID resolved → ${data.display_name} (${data.id})` };
          } else {
            state.message = { type: "warn", text: "ORCID found but no OpenAlex ID linked." };
          }
          render();
        })
        .catch(() => {
          state.message = { type: "warn", text: `Could not resolve ORCID ${orcidMatch[1]}. Check it's correct.` };
          render();
        });
    } else {
      state.message = { type: "warn", text: "Unrecognized format. Paste an OpenAlex URL (openalex.org/A...), ID (A1234...), or ORCID (0000-0002-...)." };
      render();
    }
  }

  // Remove keyword
  if (t.classList.contains("kw-remove") && t.dataset.tier != null) {
    state.profile.tiers[t.dataset.tier].keywords.splice(parseInt(t.dataset.idx), 1);
    render();
  }
  // Remove author
  if (t.classList.contains("kw-remove") && t.dataset.rmAuthor != null) {
    state.profile.authors.splice(parseInt(t.dataset.rmAuthor), 1);
    render();
  }
  // Bulk auto-resolve OpenAlex IDs
  if (t.id === "btn-bulk-find-ids") {
    const targets = state.profile.authors.map((a, i) => ({ a, i })).filter(x => !x.a.openalexId);
    if (!targets.length) { state.message = { type:"success", text:"All authors already have IDs." }; render(); return; }
    if (!confirm(`Look up OpenAlex IDs for ${targets.length} authors? This will use the best match for each based on name + affiliation. You can verify/change them afterwards.`)) return;
    state.message = { type:"info", text: `Resolving ${targets.length} author IDs… this takes ~1s per author.` };
    render();
    (async () => {
      let resolved = 0;
      let processed = 0;
      for (const { a, i } of targets) {
        const candidates = await lookupAuthorId(`${a.first} ${a.last}`, a.aff);
        if (candidates.length > 0) {
          const affWords = (a.aff || "").toLowerCase().split(/[\s,.()/-]+/).filter(w => w.length > 3);
          let best = candidates.find(c => affWords.some(w => (c.hint || "").toLowerCase().includes(w)));
          if (!best) best = candidates.sort((x,y) => y.cited - x.cited)[0];
          state.profile.authors[i].openalexId = best.id;
          if (best.orcid && best.orcid.includes("orcid.org")) state.profile.authors[i].orcid = best.orcid;
          resolved++;
        }
        processed++;
        // Live update: save and re-render after each author so user sees progress
        saveProfile();
        state.message = { type:"info", text: `Resolving authors… ${processed}/${targets.length} processed, ${resolved} matched` };
        render();
        await new Promise(r => setTimeout(r, 250));
      }
      state.message = { type:"success", text: `Resolved ${resolved} of ${targets.length} author IDs. Click 🔍 Find ID next to any that look wrong to change manually.` };
      render();
    })();
  }
  // Find OpenAlex ID for a single author
  if (t.classList.contains("btn-find-id") || t.dataset.findId != null) {
    const idx = parseInt(t.dataset.findId);
    if (!isNaN(idx)) {
      const a = state.profile.authors[idx];
      state.idLookup = { authorIdx: idx, loading: true, candidates: null, customQuery: '' };
      render();
      lookupAuthorId(`${a.first} ${a.last}`, a.aff).then(candidates => {
        state.idLookup = { authorIdx: idx, loading: false, candidates, customQuery: '' };
        render();
      });
    }
  }
  // Pick a candidate
  if (t.dataset.pickId || t.closest("[data-pick-id]")) {
    const elem = t.dataset.pickId ? t : t.closest("[data-pick-id]");
    const [authorIdx, candIdx] = elem.dataset.pickId.split("|").map(Number);
    const cand = state.idLookup.candidates[candIdx];
    state.profile.authors[authorIdx].openalexId = cand.id;
    if (cand.orcid && cand.orcid.includes("orcid.org")) {
      state.profile.authors[authorIdx].orcid = cand.orcid;
    }
    saveProfile();
    state.idLookup = null;
    state.message = { type: "success", text: `Linked ${cand.name} (${cand.hint || cand.shortId})` };
    render();
  }
  // Cancel lookup
  if (t.dataset.cancelLookup) {
    state.idLookup = null;
    render();
  }
  // Retry lookup with custom query
  if (t.dataset.lookupRetry != null) {
    const idx = parseInt(t.dataset.lookupRetry);
    const searchInput = document.querySelector('.lookup-search');
    const customQuery = searchInput?.value?.trim();
    const a = state.profile.authors[idx];
    const query = customQuery || `${a.first} ${a.last}`;
    state.idLookup = { authorIdx: idx, loading: true, candidates: null, customQuery: customQuery || '' };
    render();
    lookupAuthorId(query, a.aff).then(candidates => {
      state.idLookup = { authorIdx: idx, loading: false, candidates, customQuery: customQuery || '' };
      render();
    });
  }
  // Add keyword button
  if (t.dataset.addTier) {
    const inp = document.querySelector(`.kw-input[data-tier="${t.dataset.addTier}"]`);
    if (inp?.value.trim()) { state.profile.tiers[t.dataset.addTier].keywords.push(inp.value.trim()); render(); }
  }
  // Toggle abstract
  if (t.classList.contains("toggle-abstract")) {
    const abs = t.previousElementSibling;
    const full = abs.dataset.full === "1";
    abs.style.maxHeight = full ? "55px" : "none";
    abs.dataset.full = full ? "0" : "1";
    t.textContent = full ? "Show more" : "Show less";
  }
  // Review button
  if (t.classList.contains("btn-review") || t.closest(".btn-review")) {
    const btn = t.classList.contains("btn-review") ? t : t.closest(".btn-review");
    const idx = parseInt(btn.dataset.reviewIdx);
    if (!isNaN(idx)) openReview(idx);
  }
  // Search mode radio
  if (t.tagName === "INPUT" && t.name === "searchmode") {
    state.searchMode = t.value;
    render();
  }
  // Also handle label clicks for radio buttons
  if (t.tagName === "LABEL" && t.querySelector('input[name="searchmode"]')) {
    const radio = t.querySelector('input[name="searchmode"]');
    state.searchMode = radio.value;
    render();
  }
}

function handleInput(e) {
  const t = e.target;
  if (!t || !t.id) return;
  // Sync form fields → state on every keystroke so re-renders preserve typed values
  switch (t.id) {
    case "cfg-name":       state.profile.name = t.value; break;
    case "cfg-desc":       state.profile.description = t.value; break;
    case "cfg-days":       state.profile.lookbackDays = parseInt(t.value) || 7; break;
    case "cfg-minscore":   state.profile.minScore = parseInt(t.value) || 0; break;
    case "cfg-authscore":  state.profile.authorScore = parseInt(t.value) || 8; break;
    case "cfg-apikey":     state.apiKey = t.value; break;
    case "cfg-geminikey":  state.geminiKey = t.value; break;
    case "cfg-email-recipients": state.profile.emailRecipients = t.value; break;
  }
}

function handleKeydown(e) {
  if (e.key === "Enter" && e.target.classList.contains("kw-input")) {
    const tier = e.target.dataset.tier;
    if (e.target.value.trim()) { state.profile.tiers[tier].keywords.push(e.target.value.trim()); render(); }
  }
  if (e.key === "Enter" && e.target.classList.contains("lookup-search")) {
    const idx = parseInt(e.target.dataset.lookupIdx);
    const query = e.target.value.trim();
    if (!isNaN(idx)) {
      const a = state.profile.authors[idx];
      state.idLookup = { authorIdx: idx, loading: true, candidates: null, customQuery: query };
      render();
      lookupAuthorId(query || `${a.first} ${a.last}`, a.aff).then(candidates => {
        state.idLookup = { authorIdx: idx, loading: false, candidates, customQuery: query };
        render();
      });
    }
  }
}

// Tab clicks
$("tabs").addEventListener("click", e => {
  if (e.target.dataset.tab) { state.view = e.target.dataset.tab; state.message = null; render(); }
  if (e.target.id === "btn-new-profile") {
    const name = `New Profile ${state.profiles.length + 1}`;
    state.profile = JSON.parse(JSON.stringify(DEFAULT_PROFILE));
    state.profile.name = name;
    state.profile.tiers.tier1.keywords = [];
    state.profile.tiers.tier2.keywords = [];
    state.profile.tiers.tier3.keywords = [];
    state.profile.authors = [];
    state.activeProfile = name;
    state.results = null; state.searchDate = null;
    saveProfile();
    state.view = "config";
    render();
  }
});

// Profile switch
$("profile-select").addEventListener("change", e => {
  const name = e.target.value;
  state.activeProfile = name;
  state.profile = JSON.parse(localStorage.getItem("lm-p:" + name) || "null");
  if (!state.profile) state.profile = JSON.parse(JSON.stringify(DEFAULT_PROFILE));
  const r = JSON.parse(localStorage.getItem("lm-r:" + name) || "null");
  state.results = r?.papers || null;
  state.searchDate = r?.date || null;
  state.message = null;
  state.pipelineInfo = null;
  state.kwSuggestions = null;
  state.idLookup = null;
  localStorage.setItem("lm-active", name);
  render();
});

// ============================================================
// INIT
// ============================================================
document.getElementById("review-close").addEventListener("click", closeReview);
document.getElementById("review-overlay").addEventListener("click", closeReview);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeReview(); });
loadState();
render();
</script>
